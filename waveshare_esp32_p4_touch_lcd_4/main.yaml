substitutions:
  device_name: waveshare-p4-touch-lcd-4
  device_friendly_name: Waveshare P4 Touch LCD 4
  mic_din_pin: GPIO11
  speaker_dout_pin: GPIO9
  amp_switch_pin: GPIO53

packages:
  base:
    url: https://github.com/vantreeseba/home_automation
    ref: main
    file: home_automation/shared_packages/waveshare_p4_base.yaml
  codecs:
    url: https://github.com/vantreeseba/home_automation
    ref: main
    file: home_automation/shared_packages/es8311_es7210_audio.yaml
  mixer_resampler:
    url: https://github.com/vantreeseba/home_automation
    ref: main
    file: home_automation/shared_packages/mixer_resampler_speakers.yaml

esp32_hosted:
  id: hosted_esp_wifi
  active_high: true
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17

i2c:
  sda: GPIO7
  scl: GPIO8
  scan: true
  frequency: 400kHz
  id: i2c_bus

i2s_audio:
  - id: i2s_bus
    i2s_mclk_pin: GPIO13
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO12

touchscreen:
  - platform: gt911
    id: touchscreen_

## PANEL BACKLIGHT CONFIG
output:
  - platform: ledc
    id: backlight_
    pin: GPIO26
    frequency: 100Hz
    inverted: true
    # min_power: 0.1 # To prevent the backlight from being too dim
    max_power: 0.8 # To prevent overheating due to excessive lighting

light:
  - platform: monochromatic
    name: "backlight"
    output: backlight_
    id: backlight_light
    restore_mode: ALWAYS_ON

## MIPI DSI CONFIG
esp_ldo:
  - channel: 3
    voltage: 2.5V

display:
  - platform: mipi_dsi
    id: my_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-4C
    pixel_mode: 16bit
    color_depth: 16
    draw_rounding: 4
