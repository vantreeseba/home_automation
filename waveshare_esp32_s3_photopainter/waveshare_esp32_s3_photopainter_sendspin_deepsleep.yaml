substitutions:
  display_pixel_width: '480'   # Right most visible pixel
  display_pixel_height: '800'   # bottom most visible pixel
  display_min_pixel_x: '0'
  display_min_pixel_y: '0'
  display_rotation: '90°'

logger:
ota:
  - platform: esphome

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 60s

esphome:
  name: photo-frame-1
  friendly_name: Photo Frame 1
  on_boot:
    priority: 800
    then:
      - lambda: |-
          // AXP2101 PMIC boot sequence (matches official Waveshare firmware)
          // I2CBus raw API: write(addr, buf, len) / write_readv(addr, wbuf, wlen, rbuf, rlen)

          // reg 0x95 = LDO_VOL3_CTRL: set ALDO3 voltage to 3300mV (0x1C = 28 → 500 + 28*100)
          id(bus).write(0x34, (uint8_t[]){0x95, 0x1C}, 2);

          // reg 0x90 = LDO_ONOFF_CTRL0: enable ALDO3 (bit6) and ALDO4 (bit7)
          // Read-modify-write: send reg addr, read 1 byte back, then write [reg, newval]
          uint8_t reg90 = 0;
          id(bus).write_readv(0x34, (uint8_t[]){0x90}, 1, &reg90, 1);
          reg90 |= (1 << 6) | (1 << 7); // enable ALDO3 (display) and ALDO4
          id(bus).write(0x34, (uint8_t[]){0x90, reg90}, 2);

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal

api:
  actions:
  - action: epaper_render
    then:
      - lambda: |-
          id(my_display).update();

external_components:
  - source:
      # https://github.com/esphome/esphome/pull/12429
      type: git
      url: https://github.com/esphome/esphome
      ref: a6c403deb7603d316dce2820897902e01c3695cc
    refresh: 0s
    components: [file, http_request, media_source, speaker_source]
  - source:
      # https://github.com/esphome/esphome/pull/12284
      type: git
      url: https://github.com/esphome/esphome
      ref: 119a5c25a483c58b3d58a35c8cec95495c6491c2
    components: [sendspin,generic_image]

  # The following sources are merged into the dev branch of ESPHome, but not yet in a release.
  # We've pinned them to their specific squash merge commit id for reproducable builds.
  # These should be available in ESPHome 2026.3.0
  - source:
      # Dev commit hash for squash merge from PR#10212
      type: git
      url: https://github.com/esphome/esphome
      ref: 903971de12c1b291ca8cd367ce5cdf9af8b304ae
    components: [runtime_image]
  - source:
      # Dev commit hash for squash merge from PR#12258
      type: git
      url: https://github.com/esphome/esphome
      ref: 264c8faedd0ab956b0437ec2ecc0bacae1708923
    components: [media_player]
  - source:
      # Dev commit hash for squash merge from PR#14013
      type: git
      url: https://github.com/esphome/esphome
      ref: ba7134ee3f870ce00d2990d84b142b734028330f
    components: [mdns]
  - source:
      # Dev commit hash for squash merge from PR#14108
      type: git
      url: https://github.com/esphome/esphome
      ref: d2026b4cd74bbeb9b86941bf1887f3d93d639387
    components: [audio]

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

media_player:
  - platform: sendspin
    id: sendspin_media_player
    name: Sendspin Player

generic_image:
  - platform: sendspin
    id: sendspin_cover_art
    format: jpg
    type: rgb
    resize: ${display_pixel_width}x${display_pixel_height}
    image_source: ALBUM
    on_image_decoded:
      - lambda: |-
          ESP_LOGI("sendspin", "Cover art decoded");
          id(image_downloading_events).trigger("image_downloading_complete");
      - component.update: my_display
      - lambda: |-
          // ---------------------------------------------------------------
          // AXP2101 pre-sleep shutdown sequence
          // Mirrors axp_basic_sleep_start() from Waveshare official firmware
          // Registers sourced from XPowersLib AXP2101Constants.h
          // I2CBus raw API: write(addr, buf, len) / write_readv(addr, wbuf, wlen, rbuf, rlen)
          // ---------------------------------------------------------------
          ESP_LOGI("deep_sleep", "Image rendered - powering down peripherals before deep sleep");

          uint8_t reg = 0;

          // Disable peripheral rails on the AXP2101 PMIC before deep sleep.
          //
          // IMPORTANT: We do NOT call enableSleep() (reg 0x26 bit0) here.
          // That puts the PMIC into a sleep mode that requires an external
          // wakeup signal on its IRQ pin (GPIO21) to restore power rails.
          // ESPHome deep_sleep uses the ESP32's internal RTC timer, which
          // only needs DCDC1 (the 3V3 main rail) to stay on — the RTC domain
          // is always powered from DCDC1. Calling enableSleep() would prevent
          // the PMIC from restoring rails on RTC timer wakeup.

          // 1. Disable ADC measurements to save power
          //    reg 0x30 = ADC_CHANNEL_CTRL, bit0 = battery voltage measure
          id(bus).write_readv(0x34, (uint8_t[]){0x30}, 1, &reg, 1);
          reg &= ~(1 << 0);
          id(bus).write(0x34, (uint8_t[]){0x30, reg}, 2);
          //    reg 0x68 = BAT_DET_CTRL, bit0 = battery detection
          id(bus).write_readv(0x34, (uint8_t[]){0x68}, 1, &reg, 1);
          reg &= ~(1 << 0);
          id(bus).write(0x34, (uint8_t[]){0x68, reg}, 2);

          // 2. Disable non-essential DC-DC rails (reg 0x80 = DC_ONOFF_DVM_CTRL)
          //    bit0=DCDC1 (3V3 main rail - KEEP ON: powers ESP32 RTC domain)
          //    bits 1-4 = DCDC2-5 (disable)
          id(bus).write_readv(0x34, (uint8_t[]){0x80}, 1, &reg, 1);
          reg &= ~((1<<1)|(1<<2)|(1<<3)|(1<<4)); // disable DCDC2-5, keep DCDC1
          id(bus).write(0x34, (uint8_t[]){0x80, reg}, 2);

          // 3. Disable ALDO1, ALDO2 (reg 0x90 = LDO_ONOFF_CTRL0)
          //    bit4=ALDO1, bit5=ALDO2, bit6=ALDO3 (display), bit7=ALDO4
          id(bus).write_readv(0x34, (uint8_t[]){0x90}, 1, &reg, 1);
          reg &= ~((1<<4)|(1<<5)); // disable ALDO1, ALDO2
          id(bus).write(0x34, (uint8_t[]){0x90, reg}, 2);

          // 4. Disable BLDO1, BLDO2, CPUSLDO, DLDO1, DLDO2 (reg 0x91 = LDO_ONOFF_CTRL1)
          id(bus).write(0x34, (uint8_t[]){0x91, 0x00}, 2);

          // 5. Disable ALDO3 (display power) and ALDO4 last
          id(bus).write_readv(0x34, (uint8_t[]){0x90}, 1, &reg, 1);
          reg &= ~((1<<6)|(1<<7)); // disable ALDO3 (e-paper display), ALDO4
          id(bus).write(0x34, (uint8_t[]){0x90, reg}, 2);
          ESP_LOGI("deep_sleep", "AXP2101 rails disabled - entering deep sleep");
      - deep_sleep.enter:
          id: deep_sleep_1
    on_image_error:
      - lambda: |-
          ESP_LOGE("sendspin", "Failed to decode cover art image");
          id(image_downloading_events).trigger("image_downloading_failed");

          // AXP2101 pre-sleep shutdown (same sequence as on_image_decoded)
          // NOTE: enableSleep() (reg 0x26 bit0) intentionally omitted — see on_image_decoded.
          ESP_LOGW("deep_sleep", "Image failed - disabling AXP2101 rails before deep sleep");
          uint8_t reg = 0;
          id(bus).write_readv(0x34, (uint8_t[]){0x30}, 1, &reg, 1);
          reg &= ~(1 << 0);
          id(bus).write(0x34, (uint8_t[]){0x30, reg}, 2);
          id(bus).write_readv(0x34, (uint8_t[]){0x68}, 1, &reg, 1);
          reg &= ~(1 << 0);
          id(bus).write(0x34, (uint8_t[]){0x68, reg}, 2);
          id(bus).write_readv(0x34, (uint8_t[]){0x80}, 1, &reg, 1);
          reg &= ~((1<<1)|(1<<2)|(1<<3)|(1<<4));
          id(bus).write(0x34, (uint8_t[]){0x80, reg}, 2);
          id(bus).write_readv(0x34, (uint8_t[]){0x90}, 1, &reg, 1);
          reg &= ~((1<<4)|(1<<5));
          id(bus).write(0x34, (uint8_t[]){0x90, reg}, 2);
          id(bus).write(0x34, (uint8_t[]){0x91, 0x00}, 2);
          id(bus).write_readv(0x34, (uint8_t[]){0x90}, 1, &reg, 1);
          reg &= ~((1<<6)|(1<<7));
          id(bus).write(0x34, (uint8_t[]){0x90, reg}, 2);
          ESP_LOGI("deep_sleep", "AXP2101 rails disabled - entering deep sleep");
      - deep_sleep.enter:
          id: deep_sleep_1

# event configuration
event:
  - platform: template
    name: Rendering
    id: rendering_events
    icon: "mdi:brush"
    event_types:
      - render_complete
  - platform: template
    name: Image Downloading
    id: image_downloading_events
    icon: "mdi:download"
    event_types:
      - image_downloading_complete
      - image_downloading_failed

switch:
  - platform: template
    name: "Download and render on startup"
    id: auto_load_render
    icon: "mdi:cloud-download-outline"
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

button:
  - platform: template
    name: "Render"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(my_display).update();

i2c:
  id: bus
  sda: GPIO47
  scl: GPIO48
  scan: true

sensor:
  - platform: shtcx
    temperature:
      id: temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      accuracy_decimals: 1
    humidity:
      id: humidity
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement

spi:
  clk_pin: GPIO10
  mosi_pin: GPIO11

display:
  - platform: epaper_spi
    id: my_display
    model: 7.3in-spectra-e6
    cs_pin: GPIO9
    dc_pin: GPIO8
    busy_pin: 
      number: GPIO13
      inverted: true
      mode:
        input: true
        pullup: true
    reset_pin: 
      number: GPIO12
    update_interval: never
    rotation: 270°
    # show_test_card: true
    lambda: |-
      static const char *TAG = "${TAG} - Rendering cycle";

      ESP_LOGW(TAG, "Rendering...");

      it.fill(COLOR_OFF);
      if(id(wifi_id).is_connected()) {
        // Fullscreen sendspin cover art image
        it.image(${display_min_pixel_x}, ${display_min_pixel_y}, id(sendspin_cover_art), COLOR_OFF, COLOR_ON);
      } else { 
        ESP_LOGW(TAG, "Wifi not connected. Using offline image");
        // Centered offline placeholder
        int mid_x = $display_min_pixel_x + $display_pixel_width / 2;
        int mid_y = $display_min_pixel_y + $display_pixel_height / 2;
        it.circle(mid_x, mid_y, 10);
      }

      ESP_LOGW(TAG, "Rendering done");
      id(rendering_events).trigger("render_complete");

font:
  - file: "gfonts://Roboto"
    id: roboto_20
    size: 20
