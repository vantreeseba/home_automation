api:
  actions:
    - action: epaper_render
      then:
        - lambda: |-
            id(my_display).update();

event:
  - platform: template
    name: Rendering
    id: rendering_events
    icon: "mdi:brush"
    event_types:
      - render_complete

display:
  - platform: epaper_spi
    id: my_display
    model: Spectra-E6
    cs_pin: GPIO9
    dc_pin: GPIO8
    dimensions:
      width: $display_pixel_width
      height: $display_pixel_height
    busy_pin:
      number: GPIO13
      inverted: true
      mode:
        input: true
        pullup: true
    reset_pin:
      number: GPIO12
    update_interval: never
    rotation: $display_rotation
    lambda: |-
      if(id(wifi_id).is_connected()) {
        it.image(0, 0, id(sendspin_cover_art));
      }
      id(rendering_events).trigger("render_complete");
