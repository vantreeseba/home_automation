audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: i2c_bus
    address: 0x18
    bits_per_sample: 16bit
    sample_rate: 48000

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 48000
    i2c_id: i2c_bus

microphone:
  - platform: i2s_audio
    id: esp32_microphone
    i2s_audio_id: i2s_bus
    i2s_din_pin: ${mic_din_pin}
    sample_rate: 48000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: esp32_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: ${speaker_dout_pin}
    audio_dac: es8311_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000

switch:
  - platform: gpio
    pin: ${amp_switch_pin}
    name: "Audio Amplifier"
    id: audio_amplifier
    restore_mode: ALWAYS_OFF
