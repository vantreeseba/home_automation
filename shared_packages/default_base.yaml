esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}

logger:

ota:
  - platform: esphome

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf

api:

button:
  - platform: restart
    name: "Restart"
    entity_category: "diagnostic"


