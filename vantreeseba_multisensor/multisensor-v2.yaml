substitutions:
  name: "vantreeseba-multisensor"
  friendly_name: "Multisensor"
  temperature_offset: "-2"

packages:
  bh1750:
    url: https://github.com/vantreeseba/home_automation
    ref: main
    file: home_automation/shared_packages/bh1750_illuminance.yaml
  aht10:
    url: https://github.com/vantreeseba/home_automation
    ref: main
    file: home_automation/shared_packages/aht10_sensor.yaml

esphome:
  name: "${name}"
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project:
    name: vantreeseba.multisensor
    version: "2.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
api:
  reboot_timeout: 0s
ota:
  platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
  domain: .lan

i2c:
  sda: 25
  scl: 32
  scan: true

binary_sensor:
  - platform: gpio
    pin: GPIO27
    name: "${friendly_name} PIR Sensor"
    device_class: motion

#BLE STUFF
bluetooth_proxy:
  active: True
  
esp32_ble_tracker: 
  scan_parameters:
    # interval: 100ms
    # window: 30ms
    duration: 5s
